name: Patch baserunning source

on:
  push:
    paths:
      - .github/workflows/patch-baserunning-source.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch app-v3 baserunning algorithm
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app-v3.html')
          text = path.read_text()

          old_game_score = "function gameScore(){const a=games().map(gameParts);return a.length?clamp(a.reduce((s,x)=>s+x.total,0)/a.length):0}"
          new_game_score = "function seasonBaserunningScore(){const t=totals().t;return clamp((Number(t.sb)||0)*12+(Number(t.runs)||0)*4.5)}\nfunction gameScore(){const a=games().map(gameParts),run=seasonBaserunningScore();return a.length?clamp(a.reduce((s,x)=>s+(x.pitch===null?x.hit*.57+(x.field===null?70:x.field)*.29+run*.14:x.hit*.4+(x.field===null?70:x.field)*.2+run*.1+x.pitch*.3),0)/a.length):0}"

          old_component = "component('Baserunning',av('run'))"
          new_component = "component('Baserunning',seasonBaserunningScore())"

          if 'function seasonBaserunningScore()' not in text:
              if old_game_score not in text:
                  raise SystemExit('Expected gameScore source not found; refusing to modify file')
              text = text.replace(old_game_score, new_game_score, 1)

          if old_component in text:
              text = text.replace(old_component, new_component, 1)
          elif new_component not in text:
              raise SystemExit('Expected baserunning component source not found; refusing to modify file')

          path.write_text(text)

          # JavaScript Math.round behavior: 70.5 becomes 71.
          score = int((4 * 12 + 5 * 4.5) + 0.5)
          if score != 71:
              raise SystemExit(f'Baserunning validation failed: {score}')
          PY

      - name: Validate source
        run: |
          python - <<'PY'
          from pathlib import Path
          text = Path('app-v3.html').read_text()
          start = text.rfind('<script>') + len('<script>')
          end = text.rfind('</script>')
          Path('/tmp/app-v3.js').write_text(text[start:end])
          assert "function seasonBaserunningScore()" in text
          assert "component('Baserunning',seasonBaserunningScore())" in text
          PY
          node --check /tmp/app-v3.js
          git diff --check

      - name: Commit source fix
        run: |
          if git diff --quiet -- app-v3.html; then
            echo 'No source change needed.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add app-v3.html
          git commit -m 'Fix season baserunning algorithm'
          git push
