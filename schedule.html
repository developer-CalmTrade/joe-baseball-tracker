<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f172a"><title>Joe Baseball Schedule</title><style>:root{--navy:#0f172a;--blue:#2563eb;--green:#15803d;--red:#b91c1c;--bg:#f1f5f9;--line:#cbd5e1;--muted:#64748b}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--navy)}header{padding:22px 18px;background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#fff}h1{margin:0;font-size:1.5rem}header p{margin:6px 0 0;color:#dbeafe}main{max-width:800px;margin:auto;padding:15px}.card{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px;margin-bottom:14px}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}@media(max-width:650px){.grid{grid-template-columns:1fr}}label{display:block;font-size:.82rem;font-weight:800;margin-bottom:5px}input,select,textarea{width:100%;padding:11px;border:1px solid var(--line);border-radius:10px;font:inherit}textarea{min-height:75px}.btn{border:0;border-radius:10px;padding:11px 14px;background:var(--blue);color:#fff;font-weight:900}.btn.red{background:var(--red)}.btn.gray{background:#475569}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.event{border-left:5px solid var(--green);padding:12px;background:#f8fafc;border-radius:10px;margin:10px 0}.event.game{border-left-color:var(--red)}.badge{display:inline-block;padding:5px 9px;border-radius:999px;background:#dcfce7;color:#166534;font-size:.78rem;font-weight:800}.badge.game{background:#fee2e2;color:#991b1b}.small{font-size:.84rem;color:var(--muted)}a{color:inherit}</style></head><body><header><h1>Joe's Baseball Schedule</h1><p>Games, team practices, tournaments and lessons.</p></header><main><div class="card"><a href="./index.html">← Back to Development Tracker</a></div><div class="card"><h2>Next Event</h2><div id="next"></div></div><div class="card"><h2>Add Event</h2><div class="grid"><div><label>Type</label><select id="type"><option>Game</option><option>Team Practice</option><option>Tournament</option><option>Private Lesson</option><option>Other</option></select></div><div><label>Date</label><input id="date" type="date"></div><div><label>Start Time</label><input id="time" type="time"></div><div><label>Arrival Time</label><input id="arrival" type="time"></div><div><label>Opponent / Event Name</label><input id="title" placeholder="vs. Middletown"></div><div><label>Location</label><input id="location" placeholder="Field or address"></div></div><div style="margin-top:12px"><label>Notes</label><textarea id="notes" placeholder="Uniform, field number, pitching availability, what to bring..."></textarea></div><div class="actions"><button class="btn" onclick="addEvent()">Add Event</button></div></div><div class="card"><h2>Upcoming Schedule</h2><div id="list"></div></div></main><script>const KEY='joeSchedule_v1',$=id=>document.getElementById(id),today=()=>new Date().toISOString().slice(0,10),events=()=>JSON.parse(localStorage.getItem(KEY)||'[]');$('date').value=today();function save(a){localStorage.setItem(KEY,JSON.stringify(a))}function dt(e){return new Date(e.date+'T'+(e.time||'23:59'))}function upcoming(){let d=new Date();d.setHours(0,0,0,0);return events().filter(e=>dt(e)>=d).sort((a,b)=>dt(a)-dt(b))}function fmt(t){if(!t)return'Time TBD';let[h,m]=t.split(':').map(Number),x=h>=12?'PM':'AM';h=h%12||12;return h+':'+String(m).padStart(2,'0')+' '+x}function cls(t){return t==='Game'||t==='Tournament'?'game':''}function addEvent(){if(!$('date').value)return alert('Choose a date.');let a=events();a.push({id:Date.now(),type:$('type').value,date:$('date').value,time:$('time').value,arrival:$('arrival').value,title:$('title').value,location:$('location').value,notes:$('notes').value});save(a);['time','arrival','title','location','notes'].forEach(x=>$(x).value='');render();alert('Event added.')}function del(id){if(confirm('Delete this event?')){save(events().filter(e=>e.id!==id));render()}}function card(e){return `<div class="event ${cls(e.type)}"><span class="badge ${cls(e.type)}">${e.type}</span><h3>${e.title||e.type}</h3><p><strong>${new Date(e.date+'T12:00').toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'})}</strong> · ${fmt(e.time)}</p>${e.arrival?`<p>Arrive: ${fmt(e.arrival)}</p>`:''}${e.location?`<p>${e.location}</p>`:''}${e.notes?`<p class="small">${e.notes}</p>`:''}<button class="btn red" onclick="del(${e.id})">Delete</button></div>`}function render(){let a=upcoming();$('list').innerHTML=a.length?a.map(card).join(''):'<p class="small">No upcoming events entered.</p>';$('next').innerHTML=a.length?card(a[0]):'<p class="small">No upcoming event entered.</p>'}render();</script></body></html>
