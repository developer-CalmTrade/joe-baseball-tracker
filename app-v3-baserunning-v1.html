<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta http-equiv="Cache-Control" content="no-store">
<title>Joe Baseball</title>
<style>
html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f1f5f9}
#app{display:block;width:100%;height:100%;border:0;visibility:hidden}
#loading{position:fixed;inset:0;display:grid;place-items:center;font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:#0f172a}
</style>
</head>
<body>
<div id="loading">Loading Joe Baseball...</div>
<iframe id="app" src="app-v3.html?build=baserunning-v1"></iframe>
<script>
const frame=document.getElementById('app');
const loading=document.getElementById('loading');
frame.addEventListener('load',function(){
  const w=frame.contentWindow;
  const d=frame.contentDocument;
  try{
    w.seasonBaserunningScore=function(){
      const totals=w.totals().t;
      const stolenBasePoints=Number(totals.sb||0)*12;
      const runPoints=Number(totals.runs||0)*4.5;
      return w.clamp(stolenBasePoints+runPoints);
    };

    const originalRenderStats=w.renderStats;
    w.renderStats=function(){
      originalRenderStats();
      const score=w.seasonBaserunningScore();
      const components=Array.from(d.querySelectorAll('#gameComponentSummary .component'));
      const baserunning=components.find(function(node){
        const label=node.querySelector('b');
        return label&&label.textContent.trim()==='Baserunning';
      });
      if(baserunning){
        const value=baserunning.querySelector(':scope > span');
        const bar=baserunning.querySelector('.bar span');
        if(value)value.textContent=score;
        if(bar)bar.style.width=score+'%';
      }
    };

    w.renderAll();
  }catch(error){
    console.error('Baserunning score patch failed',error);
  }
  frame.style.visibility='visible';
  loading.style.display='none';
});
</script>
</body>
</html>
