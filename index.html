<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Joe Baseball</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f1f5f9}
    iframe{display:block;width:100%;height:100dvh;border:0;background:#f1f5f9}
  </style>
</head>
<body>
  <iframe id="app" title="Joe Baseball" src="app-v2.html?v=12"></iframe>
  <script>
    const frame=document.getElementById('app');
    frame.addEventListener('load',()=>{
      try{
        const doc=frame.contentDocument;
        const loadScript=(src)=>new Promise((resolve,reject)=>{
          const script=doc.createElement('script');
          script.src=src;
          script.onload=resolve;
          script.onerror=reject;
          doc.body.appendChild(script);
        });

        loadScript('workflow-migration.js?v=12')
          .then(()=>loadScript('score-fix.js?v=12'))
          .then(()=>loadScript('development-workflow.js?v=12'))
          .then(()=>{
            if(typeof frame.contentWindow.renderAll==='function') frame.contentWindow.renderAll();
          })
          .catch(error=>console.error('Joe Baseball enhancement failed to load',error));
      }catch(error){
        console.error('Joe Baseball enhancement failed to load',error);
      }
    });
  </script>
</body>
</html>
