<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <title>Joe Baseball</title>
  <style>
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#f1f5f9}
    iframe{display:block;width:100%;height:100dvh;border:0;background:#f1f5f9}
  </style>
</head>
<body>
  <iframe id="app" title="Joe Baseball" src="app-v2.html?v=11"></iframe>
  <script>
    const frame=document.getElementById('app');
    frame.addEventListener('load',()=>{
      try{
        const script=frame.contentDocument.createElement('script');
        script.src='score-fix.js?v=11';
        frame.contentDocument.body.appendChild(script);
      }catch(error){console.error('Scoring update failed to load',error)}
    });
  </script>
</body>
</html>
