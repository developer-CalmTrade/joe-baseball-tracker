<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<meta http-equiv="Cache-Control" content="no-store">
<title>Joe Baseball</title>
<style>html,body,#app{margin:0;width:100%;height:100%;border:0;overflow:hidden;background:#f1f5f9}</style>
</head>
<body>
<iframe id="app" title="Joe Baseball" src="app-v3.html?build=one-b-20260712"></iframe>
<script>
const frame=document.getElementById('app');
frame.addEventListener('load',()=>{
  const win=frame.contentWindow,doc=frame.contentDocument;
  function ensureTile(label,value,afterLabel){
    const metrics=doc.getElementById('battingMetrics');
    if(!metrics)return;
    let tile=[...metrics.children].find(node=>node.querySelector('.small')?.textContent.trim()===label);
    if(!tile){
      tile=doc.createElement('div');
      tile.className='metric';
      const after=[...metrics.children].find(node=>node.querySelector('.small')?.textContent.trim()===afterLabel);
      if(after)after.insertAdjacentElement('afterend',tile);else metrics.appendChild(tile);
    }
    tile.innerHTML=`<b>${value}</b><span class="small">${label}</span>`;
  }
  function addExtraBattingTiles(){
    const metrics=doc.getElementById('battingMetrics');
    if(!metrics||typeof win.totals!=='function')return;
    const t=win.totals().t;
    const singles=Math.max(0,Number(t.h||0)-Number(t.b2||0)-Number(t.b3||0)-Number(t.hr||0));
    ensureTile('1B',singles,'Hits');
    ensureTile('3B',Number(t.b3||0),'2B');
    ensureTile('HR',Number(t.hr||0),'3B');
  }
  const metrics=doc.getElementById('battingMetrics');
  if(metrics){new MutationObserver(addExtraBattingTiles).observe(metrics,{childList:true});addExtraBattingTiles();}
});
</script>
</body>
</html>
