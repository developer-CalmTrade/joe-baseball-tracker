<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f172a"><title>Joe Baseball</title><style>:root{--n:#0f172a;--b:#2563eb;--g:#15803d;--r:#b91c1c;--bg:#f1f5f9;--m:#64748b}*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,Segoe UI,sans-serif;background:var(--bg);color:var(--n)}header{position:sticky;top:0;z-index:9;padding:16px;background:linear-gradient(135deg,#0f172a,#1d4ed8);color:#fff;display:flex;gap:12px;align-items:center}.hamb{width:46px;height:46px;border:0;border-radius:12px;background:#ffffff22;color:#fff;font-size:24px}.brand b{display:block;font-size:20px}.brand span{color:#dbeafe}.drawer{position:fixed;inset:0 auto 0 0;width:290px;background:#fff;z-index:20;transform:translateX(-105%);transition:.2s}.drawer.open{transform:none}.drawer button{display:block;width:100%;padding:16px;border:0;border-bottom:1px solid #e2e8f0;background:#fff;text-align:left;font-weight:800}.shade{display:none;position:fixed;inset:0;background:#0007;z-index:15}.shade.open{display:block}main{max-width:900px;margin:auto;padding:16px}.page{display:none}.page.active{display:block}.card{background:#fff;border:1px solid #cbd5e1;border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 5px 18px #0f172a12}.hero{background:linear-gradient(135deg,#172554,#2563eb);color:#fff}.small{font-size:.84rem;color:var(--m)}.hero .small{color:#dbeafe}.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}@media(max-width:650px){.grid,.grid3{grid-template-columns:1fr}}.metric,.score{background:#eff6ff;border-radius:14px;padding:14px}.metric b,.score b{display:block;font-size:1.5rem}.score b{font-size:2.4rem}.btn{border:0;border-radius:10px;padding:11px 14px;color:#fff;background:var(--b);font-weight:900}.green{background:var(--g)}.gray{background:#475569}.orange{background:#c2410c}.actions{display:flex;gap:9px;flex-wrap:wrap;margin-top:12px}.row{display:flex;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid #e2e8f0}.win{color:var(--g);font-weight:900}.loss{color:var(--r);font-weight:900}.event{display:grid;grid-template-columns:72px 1fr;gap:12px;padding:12px 0;border-bottom:1px solid #e2e8f0}.date{background:#eff6ff;border-radius:12px;text-align:center;padding:8px}.date b{display:block;font-size:1.4rem}input,select,textarea{width:100%;padding:11px;border:1px solid #cbd5e1;border-radius:10px;font:inherit}label{display:block;font-weight:800;font-size:.82rem;margin:8px 0 5px}.notice{padding:12px;background:#fff7ed;border-left:5px solid #f97316;border-radius:10px}</style></head><body><header><button class="hamb" onclick="menu()">☰</button><div class="brand"><b>Joe Baseball</b><span>Development + Performance</span></div></header><div id="shade" class="shade" onclick="menu(false)"></div><aside id="drawer" class="drawer"><button onclick="show('dash')">🏠 Dashboard</button><button onclick="show('schedule')">📅 Schedule</button><button onclick="show('today')">🏋️ Today</button><button onclick="show('log')">📝 Log Development</button><button onclick="show('stats')">⚾ Game Performance</button><button onclick="show('history')">🗂 History</button></aside><main><section id="dash" class="page active"><div class="card hero"><div id="dateLabel"></div><h2 id="heroTitle"></h2><div id="heroNote" class="small"></div><div class="actions"><button class="btn green" onclick="show('today')">Open Today’s Plan</button><button class="btn gray" onclick="show('schedule')">Check In Event</button></div></div><div class="card"><h2>Development vs Game Performance</h2><div class="grid"><div class="score"><span class="small">Development Score</span><b id="devScore">0</b></div><div class="score"><span class="small">Game Performance Score</span><b id="gameScore">0</b></div></div><div id="insight" class="notice" style="margin-top:12px"></div></div><div class="card"><h2>Team Record</h2><div class="grid3"><div class="metric"><b id="record">4-1</b><span class="small">Record</span></div><div class="metric"><b>.800</b><span class="small">Win %</span></div><div class="metric"><b>5</b><span class="small">Games</span></div></div><div id="recordList"></div></div><div class="card"><h2>Performance Snapshot</h2><div id="snapshot" class="grid3"></div></div></section><section id="schedule" class="page"><div class="card"><h2>Upcoming Events</h2><div id="upcoming"></div></div><div class="card"><h2>Completed Events</h2><div id="completed"></div></div></section><section id="today" class="page"><div class="card"><h2 id="planTitle"></h2><div id="planReason" class="small"></div><div id="planStatus"></div><div id="tasks"></div><div class="actions"><button class="btn green" onclick="completeDev()">Mark Complete</button><button class="btn orange" onclick="skipDev()">Skip Today</button><button class="btn gray" onclick="show('log')">Log Details</button></div></div></section><section id="log" class="page"><div class="card"><h2>Development Practice</h2><label>Date</label><input id="dDate" type="date"><div class="grid"><div><label>Minutes</label><input id="mins" type="number" value="40"></div><div><label>Rope Bat</label><input id="rope" type="number" value="24"></div><div><label>Tee Swings</label><input id="tee" type="number" value="30"></div><div><label>MaxBP Swings</label><input id="maxbp" type="number" value="0"></div><div><label>Solid Contact</label><input id="solid" type="number" value="0"></div><div><label>Pitching Pitches</label><input id="pitches" type="number" value="0"></div><div><label>Pitching Strikes</label><input id="strikes" type="number" value="0"></div></div><button class="btn green" style="margin-top:12px" onclick="saveDev()">Save Development</button></div></section><section id="stats" class="page"><div class="card"><h2>Actual Game Performance</h2><div id="gameMetrics" class="grid3"></div></div></section><section id="history" class="page"><div class="card"><h2>Development History</h2><div id="devHistory"></div></div><div class="card"><h2>Game History</h2><div id="gameHistory"></div></div></section></main><script>const G='joeGames_v4',D='joeDevelopment_v4',DS='joeDevelopmentStatus_v1',A='joeAttendance_v4',S='joeSchedule_v4',M='joeMigration_v4';const canon=[{id:'gc1',date:'2026-06-14',opponent:'Hudson Valley Storm',result:'Loss',score:'12-14',pa:3,ab:1,h:0,b2:0,b3:0,hr:0,bb:2,so:0,rbi:0,runs:2,sb:0,tc:1,po:0,a:0,e:1,ip:4,pc:73,k:1,pbb:3,er:5},{id:'gc2',date:'2026-06-14',opponent:'Hudson Valley Storm',result:'Win',score:'9-7',pa:3,ab:3,h:1,b2:0,b3:0,hr:0,bb:0,so:0,rbi:0,runs:1,sb:1,tc:1,po:0,a:0,e:1,ip:0,pc:0,k:0,pbb:0,er:0},{id:'gc3',date:'2026-06-17',opponent:'HV Hawks Orange',result:'Win',score:'9-2',pa:3,ab:2,h:0,b2:0,b3:0,hr:0,bb:1,so:1,rbi:1,runs:1,sb:0,tc:0,po:0,a:0,e:0,ip:0,pc:0,k:0,pbb:0,er:0},{id:'gc4',date:'2026-06-20',opponent:'Black Dirt Barnstormers',result:'Win',score:'12-3',pa:2,ab:2,h:2,b2:1,b3:0,hr:0,bb:0,so:0,rbi:3,runs:0,sb:0,tc:2,po:1,a:0,e:1,ip:0,pc:0,k:0,pbb:0,er:0},{id:'gc5',date:'2026-07-11',opponent:'Crush Twins 10U',result:'Win',score:'11-6',pa:3,ab:1,h:0,b2:0,b3:0,hr:0,bb:2,so:1,rbi:0,runs:1,sb:3,tc:0,po:0,a:0,e:0,ip:0,pc:0,k:0,pbb:0,er:0}];const base=[['2026-07-11','Game','vs. Crush Twins 10U'],['2026-07-12','Celebration','End of Season Celebration'],['2026-07-15','Game','@ Frozen Ropes Rockies 10U'],['2026-07-17','Practice','Team Practice'],['2026-07-19','Game','vs. HV Hawks Orange 10U'],['2026-07-21','Game','vs. Beacon Bulldogs 10U']];const get=(k,d)=>JSON.parse(localStorage.getItem(k)||JSON.stringify(d)),set=(k,v)=>localStorage.setItem(k,JSON.stringify(v)),today=()=>new Date().toISOString().slice(0,10),fmt=n=>Number(n||0).toFixed(3).replace(/^0/,'.');function migrate(){if(localStorage.getItem(M)==='done')return;const custom=get(G,[]).filter(x=>!String(x.id||'').startsWith('gc'));set(G,[...canon,...custom]);localStorage.setItem(M,'done')}function games(){return get(G,canon)}function menu(on){const v=on===undefined?!drawer.classList.contains('open'):on;drawer.classList.toggle('open',v);shade.classList.toggle('open',v)}function show(id){document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');menu(false);render()}function totals(){const g=games(),t=g.reduce((a,x)=>(a.pa+=x.pa||0,a.ab+=x.ab||0,a.h+=x.h||0,a.bb+=x.bb||0,a.so+=x.so||0,a.b2+=x.b2||0,a.b3+=x.b3||0,a.hr+=x.hr||0,a.rbi+=x.rbi||0,a.runs+=x.runs||0,a.sb+=x.sb||0,a.tc+=x.tc||0,a.po+=x.po||0,a.a+=x.a||0,a.e+=x.e||0,a.ip+=x.ip||0,a.pc+=x.pc||0,a.k+=x.k||0,a.pbb+=x.pbb||0,a.er+=x.er||0,a),{pa:0,ab:0,h:0,bb:0,so:0,b2:0,b3:0,hr:0,rbi:0,runs:0,sb:0,tc:0,po:0,a:0,e:0,ip:0,pc:0,k:0,pbb:0,er:0});const avg=t.h/t.ab,obp=(t.h+t.bb)/(t.ab+t.bb),slg=((t.h-t.b2-t.b3-t.hr)+2*t.b2+3*t.b3+4*t.hr)/t.ab,fp=(t.po+t.a)/t.tc;return{g,t,avg,obp,slg,ops:obp+slg,fp,w:g.filter(x=>x.result==='Win').length,l:g.filter(x=>x.result==='Loss').length}}function score(){const z=totals(),d=get(D,[]),ds=get(DS,{}),c=Object.values(ds).filter(x=>x.status==='Completed').length,s=Object.values(ds).filter(x=>x.status==='Skipped').length,dev=Math.max(0,Math.min(100,c*20+d.length*12-s*4)),game=Math.round(Math.min(100,(z.obp*45+z.slg*35+(1-z.t.so/z.t.pa)*20)*.7+z.fp*20+Math.min(10,z.t.sb*2)));return{dev,game}}function renderDash(){const z=totals(),s=score();dateLabel.textContent=new Date().toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric'});heroTitle.textContent='Game Complete — Win';heroNote.textContent='vs. Crush Twins 10U · 11-6';devScore.textContent=s.dev;gameScore.textContent=s.game;insight.textContent=s.game>s.dev+10?'Game results are ahead of logged preparation. Keep building a repeatable routine.':s.dev>s.game+10?'Preparation is ahead of game execution. Focus on translating practice into games.':'Development and game performance are tracking closely.';record.textContent=`${z.w}-${z.l}`;recordList.innerHTML=z.g.map(x=>`<div class="row"><div><b>${x.date}</b><div class="small">${x.opponent}</div></div><div class="${x.result==='Win'?'win':'loss'}">${x.result==='Win'?'W':'L'} ${x.score}</div></div>`).join('');snapshot.innerHTML=[['AVG',fmt(z.avg)],['OBP',fmt(z.obp)],['SLG',fmt(z.slg)],['OPS',fmt(z.ops)],['BB Rate',Math.round(z.t.bb/z.t.pa*100)+'%'],['K Rate',Math.round(z.t.so/z.t.pa*100)+'%'],['RBI',z.t.rbi],['Runs',z.t.runs],['SB',z.t.sb],['Fielding %',fmt(z.fp)],['IP',z.t.ip.toFixed(1)],['ERA',((z.t.er*6)/z.t.ip).toFixed(2)]].map(x=>`<div class="metric"><b>${x[1]}</b><span class="small">${x[0]}</span></div>`).join('')}function renderStats(){const z=totals();gameMetrics.innerHTML=[['Record',`${z.w}-${z.l}`],['AVG',fmt(z.avg)],['OBP',fmt(z.obp)],['SLG',fmt(z.slg)],['OPS',fmt(z.ops)],['BB',z.t.bb],['SO',z.t.so],['RBI',z.t.rbi],['Runs',z.t.runs],['SB',z.t.sb],['Fielding %',fmt(z.fp)],['IP',z.t.ip.toFixed(1)],['K',z.t.k],['BB Allowed',z.t.pbb],['ER',z.t.er]].map(x=>`<div class="metric"><b>${x[1]}</b><span class="small">${x[0]}</span></div>`).join('')}function renderHistory(){const ds=get(DS,{}),d=get(D,[]);devHistory.innerHTML=Object.keys(ds).sort().reverse().map(k=>`<div class="row"><div><b>${k}</b><div class="small">${ds[k].note||''}</div></div><b>${ds[k].status}</b></div>`).join('')||'<div class="small">No development history yet.</div>';gameHistory.innerHTML=games().slice().reverse().map(x=>`<div class="row"><div><b>${x.date}</b><div class="small">${x.opponent}</div><div class="small">${x.h}-${x.ab}, ${x.bb} BB · ${x.po} PO, ${x.e} E</div></div><div class="${x.result==='Win'?'win':'loss'}">${x.result==='Win'?'W':'L'} ${x.score}</div></div>`).join('')}function renderSchedule(){const a=get(A,{}),s=get(S,base.map((x,i)=>({id:'b'+i,date:x[0],type:x[1],title:x[2]})));if(!localStorage.getItem(S))set(S,s);const done=s.filter(e=>a[e.id]&&a[e.id].status&&a[e.id].status!=='Scheduled'),up=s.filter(e=>!a[e.id]||!a[e.id].status||a[e.id].status==='Scheduled');upcoming.innerHTML=up.map(e=>`<div class="event"><div class="date"><b>${new Date(e.date+'T12:00').getDate()}</b>${new Date(e.date+'T12:00').toLocaleDateString(undefined,{month:'short'})}</div><div><b>${e.type}: ${e.title}</b></div></div>`).join('');completed.innerHTML=done.map(e=>`<div class="row"><div>${e.title}</div><b>${a[e.id].status}</b></div>`).join('')||'<div class="small">No completed events.</div>'}function renderPlan(){planTitle.textContent='Full Development Day';planReason.textContent='No immediate team event limits today.';tasks.innerHTML=['Warm-up — 7 minutes','Rope Bat off tee — 24 swings','Game bat tee — 30 swings','MaxBP — 36–45 pitches','Pitching command — 24 pitches if arm feels good'].map(x=>`<div class="row"><span>${x}</span></div>`).join('');const s=get(DS,{})[today()];planStatus.innerHTML=s?`<div class="notice"><b>${s.status}</b> — ${s.note||''}</div>`:''}function completeDev(){const s=get(DS,{});s[today()]={status:'Completed',note:'Marked complete'};set(DS,s);render()}function skipDev(){const r=prompt('Why skip today?','Game day / recovery / family schedule')||'Skipped';const s=get(DS,{});s[today()]={status:'Skipped',note:r};set(DS,s);render()}function saveDev(){const d=get(D,[]);d.push({id:Date.now(),date:dDate.value,minutes:+mins.value,rope:+rope.value,tee:+tee.value,max:+maxbp.value,solid:+solid.value,pitches:+pitches.value,strikes:+strikes.value});set(D,d);const s=get(DS,{});s[dDate.value]={status:'Completed',note:'Development log saved'};set(DS,s);alert('Saved');render()}function render(){renderDash();renderStats();renderHistory();renderSchedule();renderPlan()}migrate();dDate.value=today();render();</script></body></html>
